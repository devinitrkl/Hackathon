spring.application.name=hackathon-test

# Hermetic in-memory database so tests never touch the real Postgres instance.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;NON_KEYWORDS=USER
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

server.port=0

# Deterministic, offline routing for tests. The AI strategy is exercised via mocks.
routing.strategy=rule-based

llm.provider=gemini
llm.model=gemini-2.5-flash
llm.base-url=http://localhost:0
llm.api-key=test-key
llm.connect-timeout-ms=1000
llm.read-timeout-ms=1000

cors.allowed-origins=http://localhost:5173
