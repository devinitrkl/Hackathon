spring.application.name=hackathon

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/hackathon}
spring.datasource.username=${DB_USERNAME:devinitrkl}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

server.port=8080

routing.strategy=${ROUTING_STRATEGY:ai}

llm.provider=gemini
llm.model=gemini-2.5-flash
llm.base-url=https://generativelanguage.googleapis.com
llm.api-key=${GEMINI_API_KEY:}
llm.connect-timeout-ms=3000
llm.read-timeout-ms=10000

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
